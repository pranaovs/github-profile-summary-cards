name: Publish wiki

on:
  push:
    branches: [ main ]
    paths:
      - wiki/**
      - .github/workflows/publish-wiki.yml

concurrency:
  group: publish-wiki
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Same-repo wiki pushes work with the auto-generated github.token (the
      # action's default) thanks to `contents: write` above — a PAT is only
      # needed for cross-repo wikis. The old REPO_WIKI_WRITE_TOKEN PAT expired.
      - uses: Andrew-Chen-Wang/github-wiki-action@v4
